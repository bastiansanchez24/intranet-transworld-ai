<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro al Evento | Intranet Transworld Chile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f6f8; /* Color de respaldo */
            background-image: url('img/fondo-forms.jpeg'); /* Ruta de tu imagen */
            background-size: cover; /* Hace que la imagen cubra toda la pantalla */
            background-position: center; /* Centra la imagen */
            background-repeat: no-repeat; /* Evita que la imagen se repita como mosaico */
            background-attachment: fixed; /* Deja el fondo estático aunque se haga scroll */
            display: flex; 
            justify-content: center; 
            align-items: center; /* Centra la tarjeta verticalmente */
            min-height: 100vh; /* Asegura que el body ocupe todo el alto de la pantalla */
            padding: 20px; 
            margin: 0;
            box-sizing: border-box;
        }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        
        /* Estilos del Formulario */
        h1 { color: #223456; text-align: center; margin-bottom: 5px; }
        h2 { color: #206591; text-align: center; margin-top: 0; font-size: 18px; font-weight: normal; }
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background-color: #206591; color: white; border: none; padding: 15px; font-size: 16px; border-radius: 6px; margin-top: 25px; cursor: pointer; transition: 0.3s; font-weight: bold;}
        button:hover { background-color: #1a5276; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .hidden { display: none !important; }
        
        /* Caja de error */
        .error-box { color: #E74C3C; text-align: center; margin-top: 20px; padding: 15px; border: 1px solid #E74C3C; background-color: #fdf0ef; border-radius: 8px; display: none; font-weight: bold;}
        .loader { text-align: center; color: #666; margin: 20px 0; }

        /* Estilos de la Vista de Éxito */
        #success { text-align: center; color: #000; padding: 10px 0; display: flex; flex-direction: column; align-items: center;}
        .success-title { font-size: 34px; font-weight: 800; margin: 0 0 15px 0; text-transform: uppercase; }
        .success-event { font-size: 22px; font-weight: 700; margin: 0 0 25px 0; line-height: 1.3; }
        .success-desc { font-size: 18px; margin: 0 0 25px 0; line-height: 1.4; }
        .success-qr { width: 250px; height: 250px; margin-bottom: 25px; object-fit: contain; border: 1px solid #eee; padding: 10px; border-radius: 10px;}
        .success-date { font-size: 22px; margin: 0; }

        /* Estilo del botón de descarga */
        .btn-descarga {
            background-color: #82D200; 
            color: #000;
            width: auto;
            padding: 12px 30px;
            margin-top: 0;
            margin-bottom: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-descarga:hover { background-color: #72b800; }
        .btn-descarga svg { margin-right: 8px; }
    </style>
</head>
<body>

<div class="card">
    <div id="loading" class="loader">Cargando datos del evento...</div>

    <div id="form-container" class="hidden">
        <h1>Registro</h1>
        <h2 id="nombreEventoTitulo">Cargando evento...</h2>
        
        <form id="registroForm">
            <label>Nombre y Apellido</label>
            <input type="text" id="nombre" required>

            <label>Empresa</label>
            <input type="text" id="empresa" required>

            <label>Cargo</label>
            <input type="text" id="cargo" required>

            <label>Teléfono</label>
            <input type="tel" id="telefono" required>

            <label>Correo Electrónico</label>
            <input type="email" id="email" required>

            <button type="submit" id="btnEnviar">Registrarme y Obtener QR</button>
        </form>
    </div>

    <div id="success" class="hidden">
        <h1 id="successTitle" class="success-title">REGISTRADO</h1>
        <h2 id="successEventName" class="success-event">[Nombre del evento]</h2>
        <p id="successDesc" class="success-desc">Presenta el siguiente código QR en la<br>acreditación del evento.</p>
        
        <img id="successQr" class="success-qr" src="" alt="Código QR de Acceso">
        
        <button id="btnDescargarQr" class="btn-descarga" data-html2canvas-ignore="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Descargar
        </button>

        <p id="successEventDate" class="success-date">Fecha: [Fecha]</p>
    </div>

    <div id="error" class="error-box"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const EVENTO_ID = params.get('id');

    let eventoNombre = "";
    let eventoFecha = "";

    async function cargarEvento() {
        if (!EVENTO_ID) {
            mostrarError("Enlace incompleto. No se especificó un evento.");
            return;
        }

        try {
            const response = await fetch(`/registro/evento/${encodeURIComponent(EVENTO_ID)}`);
            if (!response.ok) throw new Error("Evento no encontrado");

            const data = await response.json();
            eventoNombre = data.name;
            eventoFecha = data.fecha || "";

            if (eventoFecha.includes('-') && eventoFecha.split('-')[0].length === 4) {
                const [anio, mes, dia] = eventoFecha.split('-');
                eventoFecha = `${dia}-${mes}-${anio}`;
            }

            document.getElementById('nombreEventoTitulo').innerText = eventoNombre;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('form-container').classList.remove('hidden');

        } catch (err) {
            mostrarError("No se pudo cargar la información del evento. Verifique el enlace.");
        }
    }

    // Helper para convertir el QR en Base64 (Evita problemas de Canvas Tainted al descargar)
    const convertirABase64 = (blob) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    const form = document.getElementById('registroForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        document.getElementById('error').style.display = 'none';

        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "Procesando...";

        const emailIngresado = document.getElementById('email').value.trim().toLowerCase();

        try {
            const formData = {
                full_name: document.getElementById('nombre').value,
                company: document.getElementById('empresa').value,
                job_title: document.getElementById('cargo').value,
                phone: document.getElementById('telefono').value,
                email: emailIngresado,
                accredited: false
            };

            const response = await fetch(`/registro/evento/${encodeURIComponent(EVENTO_ID)}/registrar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const result = await response.json();
            if (!response.ok) throw new Error(result.error || 'Error al registrar');

            const nuevoId = result.id;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&format=jpeg&data=${nuevoId}`;
            
            // Lo descargamos y lo pasamos a base64 para que html2canvas lo lea sin bloquearse por seguridad
            const responseQr = await fetch(qrUrl);
            const blobQr = await responseQr.blob();
            const base64Qr = await convertirABase64(blobQr);

            document.getElementById('successEventName').innerText = eventoNombre;
            document.getElementById('successEventDate').innerText = `Fecha: ${eventoFecha}`;
            document.getElementById('successQr').src = base64Qr;

            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');

        } catch (err) {
            console.error(err);
            mostrarError("Error al registrar: " + err.message);
        } finally {
            if (btn.innerText === "Procesando...") {
                btn.disabled = false;
                btn.innerText = "Registrarme y Obtener QR";
            }
        }
    });

    // NUEVO EVENTO DE DESCARGA (html2canvas)
    document.getElementById('btnDescargarQr').addEventListener('click', async () => {
        const btn = document.getElementById('btnDescargarQr');
        const cardElement = document.querySelector('.card'); // Seleccionamos la tarjeta completa
        
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = "Generando pase...";
        btn.disabled = true;

        try {
            // Renderizamos la tarjeta completa (ignorará el botón por el data-attribute)
            const canvas = await html2canvas(cardElement, {
                scale: 2, // Aumenta la calidad de la foto
                backgroundColor: '#ffffff', // Fondo blanco asegurado
                useCORS: true // Habilita recursos externos si hubieran
            });

            // Convertimos a imagen JPG
            const imgData = canvas.toDataURL('image/jpeg', 0.9);

            // Creamos un link invisible y forzamos la descarga
            const a = document.createElement('a');
            a.href = imgData;
            
            const nombreArchivo = eventoNombre ? `Pase_Acceso_${eventoNombre.replace(/\s+/g, '_')}.jpg` : "Pase_Acceso.jpg";
            a.download = nombreArchivo;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

        } catch (error) {
            console.error("Error al descargar la imagen completa:", error);
            alert("No se pudo generar la imagen automáticamente. Por favor, toma una captura de pantalla.");
        } finally {
            // Devolvemos el botón a la normalidad
            btn.innerHTML = textoOriginal;
            btn.disabled = false;
        }
    });

    function mostrarError(msg) {
        document.getElementById('loading').classList.add('hidden');
        const errBox = document.getElementById('error');
        errBox.innerText = msg;
        errBox.style.display = 'block';
    }

    cargarEvento();
</script>

</body>
</html>
